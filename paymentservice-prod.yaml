spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/paymentdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  environment: prod

payment:
  simulation:
    failure-rate: 0.0

logging:
  level:
    root: INFO
